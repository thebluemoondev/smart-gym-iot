server {
    listen 80;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location /users/ {
        proxy_pass http://user_service:6001;
    }

    location /membership/ {
        proxy_pass http://membership_service:6002;
    }

    location /workout/ {
        proxy_pass http://workout_service:6003;
    }

    location /facility/ {
        proxy_pass http://facility_service:6004;
    }
}