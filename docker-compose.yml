services:
  user_service:
    build: ./user_service
    container_name: gym_user_app
    ports:
      - "6001:6001"
    volumes:
      - ./user_service:/app
    env_file: ./user_service/.env
    networks:
      - gym_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 6001 --reload

  membership_service:
    build: ./membership_service
    container_name: gym_membership_app
    ports:
      - "6002:6002"
    volumes:
      - ./membership_service:/app
    env_file: ./membership_service/.env
    networks:
      - gym_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 6002 --reload

  workout_service:
    build: ./workout_service
    container_name: gym_workout_app
    ports:
      - "6003:6003"
    volumes:
      - ./workout_service:/app
    env_file: ./workout_service/.env
    networks:
      - gym_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 6003 --reload

  facility_service:
    build: ./facility_service
    container_name: gym_facility_app
    ports:
      - "6004:6004"
    volumes:
      - ./facility_service:/app
    env_file: ./facility_service/.env
    networks:
      - gym_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 6004 --reload

  apigateway:
    image: nginx:alpine
    container_name: gym_apigateway
    ports:
      - "80:80"
    volumes:
      - ./apigateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - user_service
      - membership_service
      - workout_service
      - facility_service
    networks:
      - gym_network
  chatbot_service:
    build: ./chatbot_service
    container_name: gym_chatbot_app
    ports:
      - "6005:6005"
    volumes:
      - ./chatbot_service:/app
    env_file: ./chatbot_service/.env
    environment:
      # Sử dụng tên service làm host để các container tự nhận diện nhau
      - USER_SERVICE_URL=http://user_service:6001
      - MEMBERSHIP_SERVICE_URL=http://membership_service:6002
      - WORKOUT_SERVICE_URL=http://workout_service:6003
      - FACILITY_SERVICE_URL=http://facility_service:6004
    networks:
      - gym_network
    depends_on:
      - user_service
      - membership_service
      - workout_service
    command: uvicorn app.main:app --host 0.0.0.0 --port 6005 --reload

networks:
  gym_network:
    driver: bridge